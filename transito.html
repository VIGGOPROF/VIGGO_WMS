<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Tránsito | Viiggo WMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="brand">
            <div class="brand-logo">V</div>
            <div class="brand-text"><strong>Usuario: Admin</strong><small>Control Logístico</small></div>
        </div>
        <nav class="nav">
            <a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
            <a href="index.html"><span class="nav-icon">📦</span> Ingreso (Excel)</a>
            <a href="distribucion.html"><span class="nav-icon">🚛</span> Distribución</a>
            <a href="recepcion.html"><span class="nav-icon">📥</span> Recepción</a>
            <a href="transito.html" class="active"><span class="nav-icon">🚢</span> En Tránsito</a>
            <a href="precios.html"><span class="nav-icon">💰</span> Precios </a>
            <a href="documentos.html"><span class="nav-icon">📄</span> Documentos</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="module-container">
            <header>
                <h2>Radar de Mercadería en Tránsito</h2>
                <p>Monitorea todos los contenedores y despachos activos que aún no han llegado a destino.</p>
            </header>

            <div class="action-bar" style="background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0;">
                <div style="display: flex; gap: 15px; flex-wrap: wrap; align-items: center; width: 100%;">
                    
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <label style="margin: 0;">🛫 Origen:</label>
                        <select id="filter-origin" style="width: 200px;">
                            <option value="ALL">Todos los orígenes</option>
                            <option value="China Central">China Central</option>
                            <option value="Argentina HQ">Argentina HQ</option>
                            <option value="Paraguay Dist.">Paraguay Dist.</option>
                            <option value="Chile Filial">Chile Filial</option>
                        </select>
                    </div>

                    <div style="display: flex; align-items: center; gap: 10px;">
                        <label style="margin: 0;">🛬 Destino:</label>
                        <select id="filter-dest" style="width: 200px;">
                            <option value="ALL">Todos los destinos</option>
                            <option value="China Central">China Central</option>
                            <option value="Argentina HQ">Argentina HQ</option>
                            <option value="Paraguay Dist.">Paraguay Dist.</option>
                            <option value="Chile Filial">Chile Filial</option>
                        </select>
                    </div>

                    <button id="refresh-transits" style="margin-left: auto;">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-right: 5px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                        Actualizar Radar
                    </button>
                </div>
            </div>

            <div id="active-transits-container" style="overflow-x: auto; margin-top: 20px;">
                <p>⏳ Buscando contenedores en tránsito...</p>
            </div>
            
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
