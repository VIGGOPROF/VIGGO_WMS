<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio de Clientes | VIGGO WMS</title>
    <link rel="stylesheet" href="style.css">
    <script>if (!localStorage.getItem('viggo_auth_token')) window.location.href = 'login.html';</script>
    <style>
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: bold; color: #475569; margin-bottom: 4px; text-transform: uppercase;}
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-family: inherit;}
        .btn-edit { background: none; border: none; cursor: pointer; font-size: 1.2rem; }
        .btn-cancel { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; display: none;}
        .btn-cc { background: #f8fafc; border: 1px solid #cbd5e1; color: #0f172a; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; font-weight: bold; margin-top: 5px; transition: 0.2s; }
        .btn-cc:hover { background: #e2e8f0; border-color: #94a3b8; }
    </style>
</head>
<body>

   <div id="sidebar-container"></div>

    <main class="main-content">
        <div class="module-container">
            <header style="margin-bottom: 25px;">
                <h2>Gestión de Distribuidores B2B</h2>
                <p style="color: #64748b; margin-top: 5px;">Directorio de clientes, asignación de precios por país e historial de saldos.</p>
            </header>

            <div style="display: grid; grid-template-columns: 350px 1fr; gap: 20px;">
                
                <div style="background: white; border: 1px solid var(--border); border-radius: 8px; padding: 20px; height: fit-content;">
                    <h3 id="form-title" style="margin-top: 0; color: #0f172a; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;">Nuevo Cliente</h3>
                    
                    <form id="client-form">
                        <input type="hidden" id="client-id">

                        <div class="input-group">
                            <label>Sede Operativa (País) *</label>
                            <select id="client-node" required></select>
                            <small style="color:#10b981; font-size: 0.7rem; font-weight:bold;">ℹ️ Aplica lista de precios de esta sede.</small>
                        </div>
                        <div class="input-group">
                            <label>Razón Social / Nombre *</label>
                            <input type="text" id="client-name" required>
                        </div>
                        <div class="input-group">
                            <label>Identificador Fiscal (CUIT/RUT) *</label>
                            <input type="text" id="client-tax" required>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap:10px;">
                            <div class="input-group"><label>Email</label><input type="email" id="client-email"></div>
                            <div class="input-group"><label>Teléfono</label><input type="text" id="client-phone"></div>
                        </div>

                        <div class="input-group">
                            <label>Dirección de Facturación</label>
                            <input type="text" id="client-address" placeholder="Calle, Número, Ciudad">
                        </div>

                        <div style="display: grid; grid-template-columns: 2fr 1fr; gap:10px;">
                            <div class="input-group"><label>Dirección de Envío</label><input type="text" id="client-shipping" placeholder="Depósito de entrega"></div>
                            <div class="input-group"><label>Cod. Postal</label><input type="text" id="client-zip"></div>
                        </div>

                        <div class="input-group">
                            <label>Observaciones / Notas Logísticas</label>
                            <textarea id="client-obs" rows="2" placeholder="Ej: Entregar por portón 2 de 8hs a 12hs..."></textarea>
                        </div>
                        
                        <button type="submit" id="btn-save-client" style="background: #0f172a; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold;">
                            💾 Guardar Cliente
                        </button>
                        <button type="button" id="btn-cancel-edit" class="btn-cancel">Cancelar Edición</button>
                        
                        <div id="client-status" style="margin-top: 10px; font-size: 0.85rem; font-weight: bold; text-align: center;"></div>
                    </form>
                </div>

                <div style="background: white; border: 1px solid var(--border); border-radius: 8px; overflow: hidden;">
                    <div style="padding: 15px; background: #f8fafc; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
                        <h3 style="margin: 0; color: #0f172a; font-size: 1rem;">Directorio Activo</h3>
                        <input type="text" id="search-client" placeholder="🔍 Buscar por nombre o CUIT..." style="padding: 6px 12px; border: 1px solid #cbd5e1; border-radius: 6px; width: 250px;">
                    </div>
                    
                    <div style="overflow-x: auto; max-height: 700px;">
                        <table class="excel-table" style="width: 100%; border-collapse: collapse;">
                            <thead>
                                <tr>
                                    <th>Razón Social</th>
                                    <th>Identificación</th>
                                    <th>Sede (País)</th>
                                    <th>Contacto / Envío</th>
                                    <th style="text-align: right;">Saldo Cta. Cte.</th>
                                    <th style="text-align: center;">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="clients-tbody">
                                <tr><td colspan="6" style="text-align: center; padding: 20px;">Cargando clientes...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        let allClients = [];

        // --- MOTOR DE ARRANQUE LIMPIO ---
        document.addEventListener("DOMContentLoaded", () => {
            loadNodesForClients();
            loadClients();
        });

        const getUserIdLocal = () => {
            const token = localStorage.getItem('viggo_auth_token');
            if (!token) return null;
            try { return JSON.parse(atob(token)).id; } catch (e) { return null; }
        };

        const loadNodesForClients = async () => {
            const select = document.getElementById('client-node');
            try {
                const res = await fetch('/api/nodes');
                const result = await res.json();
                if (res.ok && result.data) {
                    select.innerHTML = '<option value="">Seleccione país...</option>';
                    result.data.forEach(n => {
                        const nameLower = n.name.toLowerCase();
                        if (!nameLower.includes('china') && !nameLower.includes('fabrica') && !nameLower.includes('fábrica')) {
                            select.innerHTML += `<option value="${n.id}">${n.name}</option>`;
                        }
                    });
                }
            } catch (error) { console.error("Error cargando nodos"); }
        };

        const loadClients = async () => {
            const tbody = document.getElementById('clients-tbody');
            try {
                const res = await fetch('/api/clients');
                const result = await res.json();
                
                if (res.ok && result.data) {
                    allClients = result.data;
                    renderClientsTable();
                } else {
                    tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: red;">Error al cargar</td></tr>`;
                }
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: red;">Error de red</td></tr>`;
            }
        };

        const renderClientsTable = () => {
            const tbody = document.getElementById('clients-tbody');
            const searchTerm = document.getElementById('search-client').value.toLowerCase();
            
            const filtered = allClients.filter(c => 
                c.business_name.toLowerCase().includes(searchTerm) || 
                c.tax_id.toLowerCase().includes(searchTerm)
            );

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align: center;">No hay clientes registrados.</td></tr>`;
                return;
            }

            let html = '';
            filtered.forEach(c => {
                let balanceColor = c.current_balance > 0 ? '#ef4444' : (c.current_balance < 0 ? '#10b981' : '#64748b');
                let balanceText = `$ ${Math.abs(c.current_balance).toLocaleString('en-US', {minimumFractionDigits: 2})}`;
                if (c.current_balance > 0) balanceText = `Debe: ` + balanceText;
                if (c.current_balance < 0) balanceText = `A favor: ` + balanceText;
                
                const cString = JSON.stringify(c).replace(/'/g, "\\'").replace(/"/g, '&quot;');

                html += `
                    <tr>
                        <td><strong>${c.business_name}</strong></td>
                        <td>${c.tax_id}</td>
                        <td><span style="background: #e0f2fe; padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; border: 1px solid #bae6fd; font-weight:bold; color: #0369a1;">📍 ${c.node_name}</span></td>
                        <td style="font-size: 0.8rem;">
                            📧 ${c.email || '-'}<br>
                            📞 <span style="color:#64748b;">${c.phone || '-'}</span><br>
                            🚛 <span style="color:#64748b; font-style: italic;">${c.shipping_address || 'Sin direc. envío'}</span>
                        </td>
                        <td style="text-align: right;">
                            <div style="font-weight: bold; color: ${balanceColor}; font-size: 1.05em;">${balanceText}</div>
                            <button class="btn-cc" onclick="openCuentaCorriente(${c.id})">🧾 Ver Detalle</button>
                        </td>
                        <td style="text-align: center;">
                            <button class="btn-edit" onclick="editClient(${cString})" title="Editar Cliente">✏️</button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        };

        document.getElementById('search-client').addEventListener('input', renderClientsTable);

        // NAVEGACIÓN A CUENTA CORRIENTE
        window.openCuentaCorriente = (clientId) => {
            window.location.href = `cuenta_corriente.html?client_id=${clientId}`;
        };

        // LÓGICA DE EDICIÓN
        window.editClient = (client) => {
            document.getElementById('form-title').innerText = 'Editar Cliente';
            document.getElementById('client-id').value = client.id;
            document.getElementById('client-node').value = client.node_id;
            document.getElementById('client-name').value = client.business_name;
            document.getElementById('client-tax').value = client.tax_id;
            document.getElementById('client-email').value = client.email || '';
            document.getElementById('client-phone').value = client.phone || '';
            document.getElementById('client-address').value = client.address || '';
            document.getElementById('client-shipping').value = client.shipping_address || '';
            document.getElementById('client-zip').value = client.zip_code || '';
            document.getElementById('client-obs').value = client.observations || '';
            
            document.getElementById('btn-save-client').innerText = '🔄 Actualizar Cliente';
            document.getElementById('btn-save-client').style.background = '#10b981';
            document.getElementById('btn-cancel-edit').style.display = 'block';
            window.scrollTo(0, 0);
        };

        const resetForm = () => {
            document.getElementById('client-form').reset();
            document.getElementById('client-id').value = '';
            document.getElementById('form-title').innerText = 'Nuevo Cliente';
            document.getElementById('btn-save-client').innerText = '💾 Guardar Cliente';
            document.getElementById('btn-save-client').style.background = '#0f172a';
            document.getElementById('btn-cancel-edit').style.display = 'none';
        };

        document.getElementById('btn-cancel-edit').addEventListener('click', resetForm);

        document.getElementById('client-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-save-client');
            const status = document.getElementById('client-status');
            const isEditing = document.getElementById('client-id').value !== '';
            
            const payload = {
                id: document.getElementById('client-id').value,
                node_id: document.getElementById('client-node').value,
                business_name: document.getElementById('client-name').value,
                tax_id: document.getElementById('client-tax').value,
                email: document.getElementById('client-email').value,
                phone: document.getElementById('client-phone').value,
                address: document.getElementById('client-address').value,
                shipping_address: document.getElementById('client-shipping').value,
                zip_code: document.getElementById('client-zip').value,
                observations: document.getElementById('client-obs').value,
                userId: getUserIdLocal()
            };

            btn.disabled = true;
            btn.innerText = 'Guardando...';
            
            try {
                const res = await fetch('/api/clients', {
                    method: isEditing ? 'PUT' : 'POST',
                    body: JSON.stringify(payload),
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const result = await res.json();
                
                if (res.ok) {
                    status.innerHTML = `<span style="color: green;">✅ ${result.message}</span>`;
                    resetForm();
                    loadClients();
                } else {
                    status.innerHTML = `<span style="color: red;">❌ ${result.error}</span>`;
                }
            } catch (err) {
                status.innerHTML = `<span style="color: red;">❌ Error de conexión.</span>`;
            } finally {
                btn.disabled = false;
                if (!isEditing) btn.innerText = '💾 Guardar Cliente';
                setTimeout(() => { status.innerHTML = ''; }, 4000);
            }
        });
    </script>
    
    <script src="script.js"></script>
</body>
</html>
