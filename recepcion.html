<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepción | Viiggo WMS</title>
    <link rel="stylesheet" href="style.css">

    <script>
    // Candado de Seguridad VIGGO
    if (!localStorage.getItem('viggo_auth_token')) {
        window.location.href = 'login.html';
    }
</script>
    
    <style>
        /* Panel de control superior */
        .control-panel {
            background-color: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: flex-end;
            gap: 15px;
            flex-wrap: wrap;
        }

        .control-panel .form-group {
            margin-bottom: 0;
            flex: 1;
            min-width: 250px;
        }

        /* Estilos inyectados para la tabla generada por JS */
        .transit-table { 
            width: 100%; 
            border-collapse: separate; 
            border-spacing: 0; 
            background: white; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }
        
        .transit-table th, .transit-table td { 
            padding: 14px 16px; 
            text-align: left; 
            border-bottom: 1px solid var(--border); 
        }
        
        .transit-table th { 
            background-color: #f1f5f9; 
            color: var(--primary); 
            font-weight: 700; 
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        .transit-table tr:last-child td { border-bottom: none; }
        .transit-table tr:hover td { background-color: #f8fafc; }

        /* Estilo para el botón de "Recibir" generado por JS */
        .receive-btn { 
            background-image: linear-gradient(135deg, #10b981 0%, #059669 100%); 
            color: white !important; 
            border: none; 
            padding: 8px 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 0.85rem; 
            transition: all 0.2s; 
            display: inline-flex; 
            align-items: center; 
            gap: 6px;
            box-shadow: 0 2px 4px rgba(16, 185, 129, 0.2);
        }
        
        .receive-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.4); 
        }
        
        .receive-btn:disabled { 
            background: var(--text-muted) !important; 
            cursor: not-allowed; 
            transform: none; 
            box-shadow: none; 
        }

        /* Badge naranja para la cantidad en tránsito */
        .transit-qty {
            background-color: #fef3c7;
            color: #d97706;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            display: inline-block;
        }
    </style>
</head>
<body>

 <div id="sidebar-container"></div>

    <main class="main-content">
        <div class="module-container" style="max-width: 1000px;">
            <header>
                <h2>Recepción de Mercadería (Check-in)</h2>
                <p>Confirma el ingreso físico de los contenedores o envíos que se encuentran en tránsito hacia tu depósito.</p>
            </header>
            
            <div class="control-panel">
                <div class="form-group">
                    <label>Selecciona tu Depósito (Ubicación actual):</label>
                    <select id="recv-node-select">
                        <option value="2">Argentina HQ</option>
                        <option value="3">Paraguay Dist.</option>
                        <option value="4">Chile Filial</option>
                    </select>
                </div>
                
                <button id="search-transit-btn">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    Buscar Stock en Tránsito
                </button>
            </div>

            <hr>

            <div id="transit-results">
                <div style="text-align: center; padding: 40px 20px; color: var(--text-muted); background: #f8fafc; border: 1px dashed var(--border); border-radius: 8px;">
                    <span style="font-size: 2rem; display: block; margin-bottom: 10px;">🚢</span>
                    <p>Selecciona un depósito y presiona buscar para ver la mercadería en camino.</p>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    
</body>
</html>
