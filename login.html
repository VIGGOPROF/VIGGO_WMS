<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | VIGGO WMS</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        body { background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); width: 100%; max-width: 380px; text-align: center; }
        .brand-logo-login { background: #10b981; color: white; font-weight: 900; font-size: 2rem; width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; border-radius: 12px; margin: 0 auto 15px auto; }
        .login-card h2 { margin: 0 0 5px 0; color: #0f172a; }
        .login-card p { color: #64748b; font-size: 0.9rem; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: bold; color: #475569; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; outline: none; font-size: 1rem; }
        .input-group input:focus { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2); }
        .btn-login { background: #0f172a; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .btn-login:hover { background: #1e293b; }
        .btn-login:disabled { background: #94a3b8; cursor: not-allowed; }
        #login-error { color: #ef4444; font-size: 0.85rem; font-weight: bold; margin-top: 15px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-logo-login">V</div>
        <h2>VIGGO WMS</h2>
        <p>Sistema de Control Logístico y Abastecimiento</p>

        <form id="login-form">
            <div class="input-group">
                <label>Usuario</label>
                <input type="text" id="username" placeholder="Ingresa tu usuario" required autocomplete="username">
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login" id="btn-submit">Ingresar al Sistema</button>
            <div id="login-error"></div>
        </form>
    </div>

    <script>
        // Si el usuario ya está logueado, lo mandamos directo al dashboard
        if (localStorage.getItem('viggo_auth_token')) {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const errorBox = document.getElementById('login-error');
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerText = 'Verificando...';
            errorBox.innerText = '';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    body: JSON.stringify({ username: user, password: pass }),
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await res.json();

                if (res.ok) {
                    // Guardamos el token y los datos del usuario en el navegador
                    localStorage.setItem('viggo_auth_token', data.token);
                    localStorage.setItem('viggo_user_name', data.user.name);
                    localStorage.setItem('viggo_user_role', data.user.role);
                    
                    // Redirigimos al sistema
                    window.location.href = 'dashboard.html';
                } else {
                    errorBox.innerText = data.error || 'Credenciales inválidas.';
                    btn.disabled = false;
                    btn.innerText = 'Ingresar al Sistema';
                }
            } catch (err) {
                errorBox.innerText = 'Error de conexión con el servidor.';
                btn.disabled = false;
                btn.innerText = 'Ingresar al Sistema';
            }
        });
    </script>
</body>
</html>
