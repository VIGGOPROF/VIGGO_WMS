<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panorama Global | Viiggo WMS</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="style.css">
   
<script>
    if (!localStorage.getItem('viggo_auth_token')) window.location.href = 'login.html';
</script>
</head>
<body>

    <aside class="sidebar" id="sidebar-container"></aside>

    <main class="main-content">
        <div class="module-container">
            
            <div class="header-section">
                <h2>Panorama Global de Inventario</h2>
                <p>Vista matricial del stock físico y en tránsito. Las celdas amarillas indican mercadería en camino.</p>
            </div>

            <div class="toolbar">
                <div class="toolbar-group">
                    <input type="text" id="search-input" class="search-box" placeholder="🔍 Filtrar por SKU o nombre..." onkeyup="applyLocalFilters()">
                    
                    <div class="custom-select" id="multi-select-container">
                        <div class="select-btn" onclick="toggleDropdown()">
                            <span id="select-btn-text">Todas las Categorías</span>
                            <span>▼</span>
                        </div>
                        <div class="select-content" id="cat-options-list">
                            </div>
                    </div>
                </div>

                <div class="toolbar-actions">
                    <label style="display: flex; align-items: center; gap: 5px; font-size: 0.9rem; cursor: pointer; border: 1px solid #cbd5e1; padding: 7px 12px; border-radius: 6px;">
                        <input type="checkbox" id="transit-toggle" onchange="applyLocalFilters()">
                        🚚 Solo Tránsito
                    </label>
                    <button class="btn-excel" onclick="exportToExcel()">📊 Exportar a Excel</button>
                    <button class="btn-update" onclick="loadMatrixData()">🔄 Actualizar</button>
                </div>
            </div>

            <div class="matrix-container">
                <table class="matrix-table" id="matrix-table">
                    <thead id="matrix-head">
                        <tr>
                            <th class="col-left">SKU</th>
                            <th class="col-left">Producto</th>
                        </tr>
                    </thead>
                    <tbody id="matrix-body">
                        <tr>
                            <td colspan="10" style="text-align: center; padding: 30px;">⏳ Cargando matriz global...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>

    <script>
        let globalNodes = [];
        let globalItems = [];
        let isDropdownLoaded = false;

        // 1. Cargar datos maestros (Una sola vez desde el servidor)
        async function loadMatrixData() {
            const tbody = document.getElementById('matrix-body');
            const thead = document.getElementById('matrix-head');
            
            tbody.innerHTML = '<tr><td colspan="10" style="text-align: center; padding: 30px;">⏳ Obteniendo datos del servidor...</td></tr>';

            try {
                // Pedimos TODOS los datos, el filtro ahora es local e instantáneo
                const res = await fetch(`/api/dashboard`);
                const data = await res.json();

                if (data.success) {
                    globalNodes = data.nodes;
                    globalItems = data.items;

                    // Llenar checkboxes de categorías
                    if (!isDropdownLoaded && data.categories) {
                        const listContainer = document.getElementById('cat-options-list');
                        let html = '';
                        data.categories.forEach(cat => {
                            html += `
                                <label>
                                    <input type="checkbox" class="cat-filter-cb" value="${cat}" onchange="updateDropdownText(); applyLocalFilters();"> 
                                    ${cat}
                                </label>
                            `;
                        });
                        listContainer.innerHTML = html;
                        isDropdownLoaded = true;
                    }

                    // Dibujar Cabeceras (Depósitos)
                    let headerHtml = `<tr><th class="col-left">SKU</th><th class="col-left">Producto</th>`;
                    globalNodes.forEach(n => { headerHtml += `<th>${n.name}</th>`; });
                    headerHtml += `</tr>`;
                    thead.innerHTML = headerHtml;

                    // Dibujar Matriz Completa
                    applyLocalFilters();

                } else {
                    tbody.innerHTML = `<tr><td colspan="10" style="text-align: center; color: red;">❌ Error: ${data.error}</td></tr>`;
                }
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="10" style="text-align: center; color: red;">❌ Error de red al cargar la matriz.</td></tr>`;
            }
        }

        // 2. Control Visual del Desplegable
        function toggleDropdown() {
            document.getElementById('cat-options-list').classList.toggle('show');
        }

        function updateDropdownText() {
            const checkboxes = document.querySelectorAll('.cat-filter-cb:checked');
            const btnText = document.getElementById('select-btn-text');
            
            if (checkboxes.length === 0) {
                btnText.innerText = "Todas las Categorías";
            } else if (checkboxes.length === 1) {
                btnText.innerText = checkboxes[0].value;
            } else {
                btnText.innerText = `[${checkboxes.length}] Categorías filtradas`;
            }
        }

        // Cerrar el desplegable si se hace clic afuera
        window.onclick = function(event) {
            if (!event.target.closest('.custom-select')) {
                const dropdowns = document.getElementsByClassName("select-content");
                for (let i = 0; i < dropdowns.length; i++) {
                    dropdowns[i].classList.remove('show');
                }
            }
        }

        // 3. Motor de Filtro Local Instantáneo
        function applyLocalFilters() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const onlyTransit = document.getElementById('transit-toggle').checked;
            
            // Atrapamos las categorías tildadas
            const checkedCats = Array.from(document.querySelectorAll('.cat-filter-cb:checked')).map(cb => cb.value);

            // Filtramos la lista global en memoria
            const filteredItems = globalItems.filter(item => {
                // Filtro 1: Buscador de texto
                const matchText = item.sku.toLowerCase().includes(searchTerm) || item.name.toLowerCase().includes(searchTerm);
                
                // Filtro 2: Tránsito
                let hasTransit = false;
                if (onlyTransit) {
                    for (const nodeId in item.stock) {
                        if (item.stock[nodeId].transit > 0) hasTransit = true;
                    }
                } else {
                    hasTransit = true; // Pasan todos
                }

                // Filtro 3: Categorías (Pasa si no hay nada tildado, o si su categoría está en la lista)
                const matchCat = checkedCats.length === 0 || checkedCats.includes(item.category);

                return matchText && hasTransit && matchCat;
            });

            renderTableRows(filteredItems);
        }

        // 4. Dibujar las filas resultantes
        function renderTableRows(items) {
            const tbody = document.getElementById('matrix-body');
            
            if (items.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${globalNodes.length + 2}" style="text-align: center; padding: 30px; color: #64748b;">No se encontraron productos para este filtro.</td></tr>`;
                return;
            }

            let rowsHtml = '';
            items.forEach(item => {
                let rowHtml = `<tr><td class="col-left sku-bold">${item.sku}</td><td class="col-left">${item.name}</td>`;
                
                globalNodes.forEach(node => {
                    const stockData = item.stock[node.id] || { quantity: 0, transit: 0 };
                    const cellClass = stockData.transit > 0 ? 'cell-transit' : '';
                    const tooltip = stockData.transit > 0 ? `title="Físico: ${stockData.quantity} | En camino: ${stockData.transit}"` : '';
                    
                    rowHtml += `<td class="${cellClass}" ${tooltip}>${stockData.quantity}</td>`;
                });
                
                rowHtml += `</tr>`;
                rowsHtml += rowHtml;
            });

            tbody.innerHTML = rowsHtml;
        }

        // 5. Exportar a Excel
        function exportToExcel() {
            const table = document.getElementById("matrix-table");
            const wb = XLSX.utils.table_to_book(table, { sheet: "Inventario Matricial" });
            XLSX.writeFile(wb, `Inventario_Global_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        // Arranque
        document.addEventListener("DOMContentLoaded", () => {
            loadMatrixData();
        });
    </script>
    
    <script src="script.js"></script>
</body>
</html>
