<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Viiggo WMS</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">M</div>
      <div class="brand-text"><strong>Usuario: Admin</strong><small>Control del negocio</small></div>
    </div>
    <nav class="nav">
      <a href="dashboard.html"><span class="active">📊</span> Dashboard</a>
      <a href="index.html"><span class="nav-icon">📦</span> Ingreso (Excel)</a>
      <a href="distribucion.html"><span class="nav-icon">🚛</span> Distribución</a>
      <a href="recepcion.html"><span class="nav-icon">📥</span> Recepción</a>
      <a href="salida.html"><span class="nav-icon">🧾</span> Salidas / Ventas</a>
      <a href="precios.html"><span class="nav-icon">💰</span> Precios</a>
      <a href="documentos.html"><span class="nav-icon">📄</span> Documentos</a>
    </nav>
  </aside>

  <div class="main-content">
      <div class="module-container">
          <h2>Panorama Global de Inventario</h2>
          <p>Vista matricial del stock físico y en tránsito. Las celdas amarillas indican mercadería en camino.</p>

          <div class="action-bar">
              <div class="search-box">
                  <span class="search-icon">🔍</span>
                  <input type="text" id="dashboard-search" placeholder="Filtrar por SKU o nombre...">
              </div>
              
              <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                  <label class="filter-toggle">
                      <input type="checkbox" id="filter-transit">
                      🚚 Solo Tránsito
                  </label>

                  <button id="export-dashboard-btn">
                      📊 Exportar a Excel
                  </button>

                  <button id="refresh-dashboard">
                      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-right: 5px;">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                      </svg>
                      Actualizar
                  </button>
              </div>
          </div>
          
          <div id="dashboard-container" style="overflow-x: auto;">
              <p>⏳ Cargando matriz de stock...</p>
          </div>
      </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
