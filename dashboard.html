<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Viiggo WMS</title>
    <link rel="stylesheet" href="style.css"> 

    <script>
        // Candado de Seguridad VIGGO
        if (!localStorage.getItem('viggo_auth_token')) {
            window.location.href = 'login.html';
        }
    </script>
    
</head>
<body>

    <div id="sidebar-container"></div>

    <main class="main-content">
        <div class="module-container">
            <header style="margin-bottom: 25px;">
                <h2 style="margin: 0 0 5px 0;">Panorama Global de Inventario</h2>
                <p style="color: #64748b; margin: 0;">Vista matricial del stock físico y en tránsito. Las celdas amarillas indican mercadería en camino.</p>
            </header>

            <div class="action-bar" style="display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; background: white; padding: 15px; border-radius: 8px; border: 1px solid var(--border);">
                <div class="search-box" style="display: flex; align-items: center;">
                    <span class="search-icon" style="margin-right: 10px;">🔍</span>
                    <input type="text" id="dashboard-search" placeholder="Filtrar por SKU o nombre..." style="padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; width: 250px;">
                </div>
                
                <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                    <label class="filter-toggle" style="cursor: pointer; font-weight: bold; color: #475569;">
                        <input type="checkbox" id="filter-transit">
                        🚚 Solo Tránsito
                    </label>

                    <button id="export-dashboard-btn" style="background: #10b981; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold;">
                        📊 Exportar a Excel
                    </button>

                    <button id="refresh-dashboard" style="background: #0f172a; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; align-items: center;">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-right: 5px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                        Actualizar
                    </button>
                </div>
            </div>
            
            <div id="dashboard-container" style="background: white; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; padding: 20px; min-height: 200px;">
                <p style="text-align: center; color: #64748b;">⏳ Cargando matriz de stock...</p>
            </div>

        </div>
    </main>

    <script>
        // --- MOTOR DE ARRANQUE LIMPIO ---
        document.addEventListener("DOMContentLoaded", () => {
            // NOTA: Si la función que dibuja tu dashboard está en este archivo, ponla aquí.
            // Ejemplo: loadDashboardMatrix();
            
            // Si la lógica está dentro de tu archivo script.js global, 
            // no necesitas agregar nada más aquí.
        });
    </script>

    <script src="script.js"></script>
</body>
</html>
